<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Welcome to Tempy</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f6f8fb; padding: 24px; }
    .card { max-width: 600px; margin:auto; background:#ffffff; border-radius:12px; padding:24px; box-shadow:0 6px 20px rgba(0,0,0,0.08); }
    .brand { color:#4A90E2; font-size:22px; font-weight:700; }
    .cta { margin-top:20px; }
    .btn { background:#4A90E2; color:#fff; padding:12px 18px; text-decoration:none; border-radius:8px; display:inline-block; }
    .small { color:#6b7280; font-size:12px; margin-top:14px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">Welcome to Tempy, {{ name }} 🎉</div>
    <p>Thanks for signing in. Create resumes, invitations, and social templates — fast, simple, and in your language.</p>
    <div class="cta">
      <a class="btn" href="https://tempy.in">Start creating</a>
    </div>
    <p class="small">If this wasn't you, you can ignore this email.</p>
  </div>
</body>
</html>
