<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Password Reset OTP</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
    .container { max-width: 600px; margin: auto; background: #ffffff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h2 { color: #E53935; }
    p { font-size: 16px; color: #333333; }
    .otp { font-size: 24px; font-weight: bold; color: #E53935; margin: 20px 0; }
    .footer { margin-top: 20px; font-size: 12px; color: #888888; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Password Reset OTP</h2>
    <p>Hello {{ user_name }},</p>
    <p>Your OTP is:</p>
    <div class="otp">{{ otp }}</div>
    <p>This OTP will expire in <strong>5 minutes</strong>. Please do not share it with anyone.</p>
    <p>If you didn’t request this, you can safely ignore this email.</p>
    <div class="footer">
      &copy; 2026 Tempy Inc. All rights reserved.
    </div>
  </div>
</body>
</html>
